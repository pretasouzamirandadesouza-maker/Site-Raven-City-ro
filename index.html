<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Raven City Roleplay | Oficial</title>
    <style>
        body, html {
            margin: 0; padding: 0;
            font-family: 'Arial Black', Gadget, sans-serif;
            height: 100vh; overflow: hidden;
            display: flex; justify-content: center; align-items: center;
        }

        /* Fundo com a imagem que você enviou */
        .background {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(45, 15, 66, 0.4), rgba(34, 10, 48, 0.7)), 
                        url('https://p-v.net.br'); 
            background-size: cover;
            background-position: center;
            z-index: -1;
        }

        .container {
            text-align: center;
            padding: 40px;
            background: rgba(0, 0, 0, 0.6);
            border-radius: 15px;
            border: 3px solid #ff71ce; /* Rosa Neon */
            box-shadow: 0 0 20px #ff71ce, 0 0 40px #01cdfe; /* Efeito Neon Duplo */
            backdrop-filter: blur(10px);
            max-width: 450px;
        }

        h1 {
            font-size: 3.5rem;
            margin: 0;
            color: #fff;
            text-shadow: 3px 3px #ff71ce, 6px 6px #01cdfe;
            text-transform: uppercase;
            font-style: italic;
        }

        p {
            color: #fff;
            font-size: 1.1rem;
            margin: 20px 0;
            font-weight: bold;
            text-shadow: 1px 1px 5px black;
        }

        /* Botão Estilo GTA VI */
        .btn-download {
            display: inline-block;
            background: linear-gradient(45deg, #ff71ce, #01cdfe);
            color: #fff;
            padding: 18px 35px;
            text-decoration: none;
            font-size: 1.2rem;
            border-radius: 5px;
            transition: 0.3s;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        .btn-download:hover {
            transform: translateY(-3px);
            filter: brightness(1.2);
        }

        .status {
            display: block;
            margin-top: 20px;
            color: #fff34f; /* Amarelo neon */
            font-size: 0.9rem;
            letter-spacing: 2px;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }
    </style>
</head>
<body>

    <div class="background"></div>

    <div class="container">
        <h1>RAVEN CITY</h1>
        <p>A experiência definitiva de Roleplay no seu celular.</p>
        
        <!-- Coloque o link do seu APK no lugar do # -->
        <a href="#" class="btn-download">DOWNLOAD APK</a>

        <span class="status">● LANÇAMENTO EM BREVE ●</span>
    </div>

</body>
</html>
